{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="container mx-auto p-4 flex flex-col items-center justify-center min-h-screen">
    <div class="bg-white shadow-xl rounded-xl p-8 max-w-sm w-full">
        <h1 class="text-3xl font-bold mb-6 text-red-600 text-center">Admin Access</h1>
        <form method="POST" action="{{ url_for('admin_login') }}" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Admin Username</label>
                <input type="text" id="username" name="username" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-red-500 focus:border-red-500 transition duration-150"
                       placeholder="Enter admin username">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-red-500 focus:border-red-500 transition duration-150"
                       placeholder="Enter password">
            </div>
            
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-lg transition duration-150 shadow-md">
                Login
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-gray-500">
            <a href="{{ url_for('select_login_type') }}" class="text-blue-600 hover:text-blue-800 font-medium">
                &larr; Back to Login Selection
            </a>
        </p>
    </div>
</div>
{% endblock %}
